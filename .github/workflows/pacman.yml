name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pacman-animation
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Generate pacman contribution graph
        uses: abozanona/pacman-contribution-graph@REPLACE_WITH_FULL_40_CHAR_COMMIT_SHA
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Publish SVGs to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          test -f dist/pacman-contribution-graph.svg
          test -f dist/pacman-contribution-graph-dark.svg

          publish_dir="$(mktemp -d)"
          cp -R dist/. "$publish_dir/"
          touch "$publish_dir/.nojekyll"

          cd "$publish_dir"
          git init
          git checkout -b output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Update pacman contribution graph"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin output
